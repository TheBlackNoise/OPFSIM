<!DOCTYPE html>
<html>
<head>
    <title>FC Simulation</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
      }
        canvas {
            background-color: #333;
            border: 4px solid #555;
            display: block;
            margin: 20px auto;
            /* This code stops the browser from blurring pixels */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

    <h1>FC Interaction Sim</h1>
    <p>More Coming Soon!</p>
    
    <!-- This is the canvas box where your FC sprites will move -->
       <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script src="config.js"></script>
    <script src="fermi.js"></script>
    <script src="zero.js"></script>
    <script src="characters.js"></script>
    <script src="engine.js"></script>
</body>
</html>
